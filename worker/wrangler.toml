name = "drone-zone-proxy"
main = "src/index.js"
compatibility_date = "2025-01-01"

# 배포 후 아래처럼 시크릿 등록:
#   cd worker && npx wrangler secret put VWORLD_KEY
#   cd worker && npx wrangler secret put KAKAO_KEY
# (필요시) 도메인 제한이 있는 V-World 키 대응용:
#   npx wrangler secret put VWORLD_DOMAIN

[vars]
# 공개돼도 되는 기본값만

# D1 데이터베이스 (커뮤니티 스팟 저장)
[[d1_databases]]
binding = "DB"
database_name = "drone-zone-db"
database_id = "4adea330-b65c-4a8c-919f-9d45acd3f1ae"
